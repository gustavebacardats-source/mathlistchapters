<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Examenhub — Gustave</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Instrument+Serif&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0c0c10; --bg2:#14141c; --bg3:#1c1c28; --border:#2a2a3a;
  --text:#e4e2dd; --text2:#a8a5a0; --text3:#6b6860;
  --red:#e8453c; --orange:#e8943c; --green:#3cb06c; --blue:#3c8ce8; --purple:#9c6ce8; --yellow:#e8c83c;
  --redBg:#e8453c15; --orangeBg:#e8943c15; --greenBg:#3cb06c15; --blueBg:#3c8ce815; --purpleBg:#9c6ce815;
  --radius:10px; --mono:'DM Mono',monospace; --serif:'Instrument Serif',serif; --sans:'DM Sans',sans-serif;
}
* { box-sizing:border-box; margin:0; padding:0; }
body { background:var(--bg); color:var(--text); font-family:var(--sans); line-height:1.6; -webkit-font-smoothing:antialiased; }
::selection { background:var(--red); color:#fff; }
::-webkit-scrollbar { width:6px; }
::-webkit-scrollbar-track { background:var(--bg); }
::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }
.container { max-width:820px; margin:0 auto; padding:2rem 1.5rem; }

header { padding:2.5rem 0 1.5rem; }
header h1 { font-family:var(--serif); font-size:clamp(2.5rem,6vw,4rem); font-weight:400; letter-spacing:-2px; line-height:1.1; }
header h1 span { color:var(--red); }
header p { font-size:0.8rem; color:var(--text3); font-family:var(--mono); margin-top:0.25rem; }

.view { display:none; }
.view.active { display:block; }

/* Hub: overall countdown */
.countdown { display:flex; gap:0.5rem; overflow-x:auto; padding-bottom:0.5rem; margin-bottom:1.5rem; }
.countdown-item { min-width:96px; padding:0.6rem 0.8rem; background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius); text-align:center; flex-shrink:0; }
.countdown-label { font-family:var(--mono); font-size:0.6rem; color:var(--text3); text-transform:uppercase; letter-spacing:1px; }
.countdown-days { font-family:var(--serif); font-size:1.7rem; }
.countdown-date { font-family:var(--mono); font-size:0.65rem; color:var(--text3); }

/* Group cards */
.group { background:var(--bg2); border:1px solid var(--border); border-radius:14px; padding:1.25rem; margin-bottom:1rem; }
.group-head { display:flex; align-items:center; gap:0.85rem; margin-bottom:1rem; }
.group-emoji { font-size:1.9rem; line-height:1; flex-shrink:0; }
.group-info { flex:1; min-width:0; }
.group-name { font-size:1.05rem; font-weight:700; }
.group-stats { font-family:var(--mono); font-size:0.68rem; color:var(--text3); margin-top:1px; }
.group-streak { text-align:center; flex-shrink:0; }
.group-streak-flame { font-family:var(--serif); font-size:1.5rem; line-height:1; }
.group-streak-label { font-family:var(--mono); font-size:0.55rem; color:var(--text3); text-transform:uppercase; letter-spacing:1px; }
.group-level-bar { background:var(--bg); border-radius:20px; height:7px; overflow:hidden; margin-bottom:1rem; }
.group-level-fill { height:100%; border-radius:20px; transition:width 0.6s cubic-bezier(0.16,1,0.3,1); }

/* Subject chips */
.subjects { display:grid; grid-template-columns:repeat(auto-fill,minmax(155px,1fr)); gap:0.5rem; }
.subject-chip { background:var(--bg3); border:1px solid var(--border); border-radius:var(--radius); padding:0.8rem 0.9rem; cursor:pointer; transition:all 0.2s; position:relative; }
.subject-chip.active:hover { border-color:#3a3a4a; transform:translateY(-2px); }
.subject-chip.locked { opacity:0.55; cursor:default; }
.subject-chip-top { display:flex; align-items:center; gap:0.5rem; margin-bottom:0.5rem; }
.subject-chip-emoji { font-size:1.2rem; line-height:1; }
.subject-chip-name { font-size:0.85rem; font-weight:600; flex:1; }
.subject-chip-exam { font-family:var(--mono); font-size:0.62rem; color:var(--text3); margin-bottom:0.5rem; }
.subject-chip-bar { background:var(--bg); border-radius:10px; height:5px; overflow:hidden; }
.subject-chip-fill { height:100%; border-radius:10px; transition:width 0.5s; }
.subject-chip-pct { font-family:var(--mono); font-size:0.6rem; color:var(--text3); margin-top:3px; }
.lock-badge { position:absolute; top:0.7rem; right:0.7rem; font-size:0.7rem; }
.soon-badge { font-family:var(--mono); font-size:0.6rem; color:var(--text3); }

/* Subject detail */
.back-btn { background:var(--bg2); border:1px solid var(--border); color:var(--text2); font-family:var(--mono); font-size:0.72rem; padding:7px 14px; border-radius:7px; cursor:pointer; transition:all 0.2s; margin-bottom:1rem; }
.back-btn:hover { border-color:var(--text3); color:var(--text); }
.detail-title { font-family:var(--serif); font-size:2.4rem; font-weight:400; letter-spacing:-1px; line-height:1.1; }
.detail-sub { font-size:0.8rem; color:var(--text3); font-family:var(--mono); margin-bottom:1.25rem; }

.progress-bar { background:var(--bg3); border-radius:20px; height:8px; overflow:hidden; }
.progress-fill { height:100%; border-radius:20px; transition:width 0.6s cubic-bezier(0.16,1,0.3,1); }
.progress-label { display:flex; justify-content:space-between; font-family:var(--mono); font-size:0.72rem; color:var(--text3); margin:0.4rem 0 0.75rem; }

.stats { display:grid; grid-template-columns:repeat(auto-fit,minmax(120px,1fr)); gap:0.6rem; margin:1.25rem 0; }
.stat { background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius); padding:0.9rem; text-align:center; }
.stat-number { font-family:var(--serif); font-size:1.8rem; }
.stat-label { font-family:var(--mono); font-size:0.65rem; color:var(--text3); text-transform:uppercase; letter-spacing:1px; margin-top:0.2rem; }

.game-hud { display:flex; gap:0.6rem; margin-bottom:1.25rem; flex-wrap:wrap; }
.hud-card { flex:1; min-width:140px; background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius); padding:0.85rem 1rem; display:flex; align-items:center; gap:0.7rem; }
.hud-icon { font-size:1.5rem; line-height:1; flex-shrink:0; }
.hud-body { flex:1; min-width:0; }
.hud-top { display:flex; justify-content:space-between; align-items:baseline; margin-bottom:0.3rem; }
.hud-title { font-size:0.82rem; font-weight:700; }
.hud-sub { font-family:var(--mono); font-size:0.62rem; color:var(--text3); }
.hud-mini-bar { background:var(--bg3); border-radius:10px; height:5px; overflow:hidden; }
.hud-mini-fill { height:100%; border-radius:10px; transition:width 0.5s; }
.streak-flame { font-family:var(--serif); font-size:1.7rem; line-height:1; }

nav { display:flex; gap:0.25rem; margin-bottom:1.5rem; background:var(--bg2); border-radius:var(--radius); padding:4px; border:1px solid var(--border); }
nav button { flex:1; padding:0.6rem 0.4rem; border:none; border-radius:7px; background:transparent; color:var(--text3); font-family:var(--sans); font-size:0.78rem; font-weight:600; cursor:pointer; transition:all 0.2s; }
nav button.active { background:var(--bg); color:var(--text); box-shadow:0 2px 8px #0005; }
nav button:hover:not(.active) { color:var(--text2); }

.section { display:none; }
.section.active { display:block; }

.phase { display:inline-flex; align-items:center; gap:6px; padding:4px 12px; border-radius:20px; font-family:var(--mono); font-size:0.7rem; font-weight:500; text-transform:uppercase; letter-spacing:1px; margin-bottom:0.75rem; }
.phase-1 { background:var(--redBg); color:var(--red); }
.phase-2 { background:var(--orangeBg); color:var(--orange); }
.phase-3 { background:var(--blueBg); color:var(--blue); }
.phase-4 { background:var(--greenBg); color:var(--green); }
.phase-5 { background:var(--purpleBg); color:var(--purple); }
.exam-banner { background:linear-gradient(135deg,var(--bg2),var(--redBg)); border:1px solid var(--red); border-radius:var(--radius); padding:0.85rem 1.1rem; margin:1.75rem 0 0.85rem; }
.exam-banner-title { font-size:0.95rem; font-weight:700; display:flex; align-items:center; gap:0.5rem; }
.exam-banner-title span { font-family:var(--mono); font-size:0.7rem; font-weight:400; color:var(--text3); background:var(--bg); padding:2px 8px; border-radius:4px; }
.exam-banner-desc { font-family:var(--mono); font-size:0.68rem; color:var(--text2); margin-top:0.3rem; }

.chapter { background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius); margin-bottom:0.5rem; overflow:hidden; transition:border-color 0.2s; }
.chapter:hover { border-color:#3a3a4a; }
.chapter.completed { opacity:0.5; }
.chapter-header { padding:1rem 1.25rem; cursor:pointer; display:flex; align-items:center; gap:0.75rem; user-select:none; }
.chapter-number { width:28px; height:28px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-family:var(--mono); font-size:0.75rem; font-weight:500; flex-shrink:0; }
.chapter-info { flex:1; min-width:0; }
.chapter-title { font-weight:600; font-size:0.95rem; line-height:1.3; }
.chapter-meta { font-family:var(--mono); font-size:0.7rem; color:var(--text3); margin-top:2px; }
.chapter-toggle { font-size:0.8rem; color:var(--text3); transition:transform 0.3s; flex-shrink:0; }
.chapter.open .chapter-toggle { transform:rotate(180deg); }
.chapter-body { max-height:0; overflow:hidden; transition:max-height 0.4s cubic-bezier(0.16,1,0.3,1); }
.chapter.open .chapter-body { max-height:2400px; }
.chapter-content { padding:0 1.25rem 1.25rem; border-top:1px solid var(--border); padding-top:1rem; }

.criteria-item { display:flex; align-items:flex-start; gap:0.6rem; padding:0.5rem 0; font-size:0.85rem; color:var(--text2); line-height:1.5; }
.criteria-check { width:20px; height:20px; border-radius:5px; border:2px solid var(--border); cursor:pointer; flex-shrink:0; margin-top:2px; display:flex; align-items:center; justify-content:center; font-size:0.7rem; transition:all 0.2s; background:transparent; color:transparent; }
.criteria-check:hover { border-color:var(--text3); }
.criteria-check.checked { background:var(--green); border-color:var(--green); color:#fff; }
.criteria-text.done { text-decoration:line-through; color:var(--text3); }

.exercises { margin-top:0.75rem; padding:0.75rem 1rem; background:var(--bg3); border-radius:7px; font-size:0.8rem; color:var(--text2); line-height:1.7; }
.exercises strong { color:var(--text); font-weight:500; }
.ex-tier { margin-top:0.6rem; }
.ex-tier-label { font-family:var(--mono); font-size:0.65rem; text-transform:uppercase; letter-spacing:1px; font-weight:500; margin-bottom:0.3rem; }
.ex-item { display:flex; align-items:center; gap:0.5rem; padding:0.2rem 0; font-size:0.8rem; color:var(--text2); }
.ex-check { width:17px; height:17px; border-radius:4px; border:2px solid var(--border); cursor:pointer; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:0.6rem; transition:all 0.2s; background:transparent; color:transparent; }
.ex-check:hover { border-color:var(--text3); }
.ex-check.checked { background:var(--blue); border-color:var(--blue); color:#fff; }
.ex-text { font-family:var(--mono); font-size:0.75rem; }
.ex-text.done { text-decoration:line-through; color:var(--text3); }

.tip { margin-top:0.75rem; padding:0.6rem 1rem; border-left:3px solid var(--orange); background:var(--orangeBg); border-radius:0 7px 7px 0; font-size:0.8rem; color:var(--orange); line-height:1.5; }
.jarvis { margin-top:0.75rem; padding:0.6rem 1rem; border-left:3px solid var(--purple); background:var(--purpleBg); border-radius:0 7px 7px 0; font-size:0.8rem; color:var(--purple); line-height:1.5; cursor:pointer; position:relative; }
.jarvis::after { content:'kopieer'; position:absolute; right:10px; top:50%; transform:translateY(-50%); font-family:var(--mono); font-size:0.65rem; opacity:0.5; }
.jarvis:hover::after { opacity:1; }
.jarvis.copied::after { content:'gekopieerd ✓'; color:var(--green); }

.formula-card { background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius); padding:1.25rem; margin-bottom:0.5rem; }
.formula-card h3 { font-size:0.9rem; font-weight:600; margin-bottom:0.75rem; display:flex; align-items:center; gap:0.5rem; }
.formula-card h3 .dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
.formula-item { font-family:var(--mono); font-size:0.8rem; color:var(--text2); padding:0.4rem 0; line-height:1.6; border-bottom:1px solid var(--border); }
.formula-item:last-child { border:none; }
.formula-name { color:var(--text); font-family:var(--sans); font-weight:500; }

.day-card { background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius); padding:1rem 1.25rem; margin-bottom:0.5rem; }
.day-card h3 { font-size:0.9rem; font-weight:600; margin-bottom:0.5rem; }
.day-card .day-date { font-family:var(--mono); font-size:0.7rem; color:var(--text3); }
.day-tasks { font-size:0.85rem; color:var(--text2); line-height:1.8; }

.reset-btn { background:var(--bg3); border:1px solid var(--border); color:var(--text3); font-family:var(--mono); font-size:0.7rem; padding:6px 14px; border-radius:6px; cursor:pointer; transition:all 0.2s; }
.reset-btn:hover { border-color:var(--red); color:var(--red); }
.reset-row { display:flex; justify-content:flex-end; margin-bottom:0.75rem; }

.game-intro { font-size:0.85rem; color:var(--text2); margin-bottom:1.5rem; line-height:1.6; }
.level-card { background:linear-gradient(135deg,var(--bg2),var(--bg3)); border:1px solid var(--border); border-radius:var(--radius); padding:1.5rem; margin-bottom:1rem; text-align:center; }
.level-badge { font-family:var(--serif); font-size:3.5rem; line-height:1; background:linear-gradient(135deg,var(--yellow),var(--orange)); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; }
.level-title { font-size:1.1rem; font-weight:700; margin:0.25rem 0; }
.level-xp { font-family:var(--mono); font-size:0.75rem; color:var(--text3); margin-bottom:0.75rem; }
.level-bar { background:var(--bg); border-radius:20px; height:10px; overflow:hidden; max-width:320px; margin:0 auto; }
.level-fill { height:100%; background:linear-gradient(90deg,var(--yellow),var(--orange)); border-radius:20px; transition:width 0.6s; }
.level-next { font-family:var(--mono); font-size:0.65rem; color:var(--text3); margin-top:0.4rem; }
.section-heading { font-family:var(--serif); font-size:1.5rem; margin:1.5rem 0 0.75rem; }
.boss { background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius); padding:1.1rem 1.25rem; margin-bottom:0.6rem; transition:border-color 0.3s; }
.boss.defeated { border-color:var(--green); background:linear-gradient(135deg,var(--bg2),var(--greenBg)); }
.boss-top { display:flex; align-items:center; gap:0.75rem; margin-bottom:0.6rem; }
.boss-emoji { font-size:1.8rem; line-height:1; flex-shrink:0; }
.boss-info { flex:1; min-width:0; }
.boss-name { font-weight:700; font-size:0.95rem; }
.boss-type { font-family:var(--mono); font-size:0.65rem; text-transform:uppercase; letter-spacing:1px; color:var(--text3); }
.boss-hp-label { font-family:var(--mono); font-size:0.7rem; font-weight:500; flex-shrink:0; }
.hp-bar { background:var(--bg); border-radius:20px; height:14px; overflow:hidden; border:1px solid var(--border); }
.hp-fill { height:100%; border-radius:20px; transition:width 0.7s cubic-bezier(0.16,1,0.3,1); background:linear-gradient(90deg,#e8453c,#e8943c); }
.hp-fill.low { background:linear-gradient(90deg,#e8453c,#c62828); }
.hp-fill.mid { background:linear-gradient(90deg,#e8943c,#e8c83c); }
.boss-defeated-label { color:var(--green); font-family:var(--mono); font-size:0.7rem; font-weight:500; margin-top:0.5rem; }
.boss-meta { font-family:var(--mono); font-size:0.65rem; color:var(--text3); margin-top:0.4rem; }
.rules-card { background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius); padding:1.1rem 1.25rem; font-size:0.8rem; color:var(--text2); line-height:1.9; }
.rules-card strong { color:var(--text); font-weight:600; }
.xp-pill { display:inline-block; font-family:var(--mono); font-size:0.7rem; background:var(--bg3); color:var(--yellow); padding:1px 7px; border-radius:4px; }
.empty-state { text-align:center; padding:3rem 1rem; color:var(--text3); }
.empty-state .big { font-size:2.5rem; margin-bottom:0.5rem; }

footer { margin-top:3rem; padding:1.5rem 0; border-top:1px solid var(--border); text-align:center; font-family:var(--mono); font-size:0.7rem; color:var(--text3); }

@media (max-width:600px) {
  .container { padding:1rem; }
  header h1 { font-size:2rem; letter-spacing:-1px; }
  .stats { grid-template-columns:repeat(2,1fr); }
  nav button { font-size:0.68rem; padding:0.5rem 0.2rem; }
  .subjects { grid-template-columns:repeat(2,1fr); }
}

/* Today study overview */
.today-card { background:linear-gradient(135deg,var(--bg2),var(--bg3)); border:1px solid var(--border); border-radius:14px; padding:1.15rem 1.25rem; margin-bottom:1.25rem; }
.today-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:0.75rem; }
.today-title { font-family:var(--serif); font-size:1.3rem; }
.today-date { font-family:var(--mono); font-size:0.7rem; color:var(--text3); }
.today-tasks { display:flex; flex-direction:column; gap:0.4rem; }
.today-task { display:flex; align-items:flex-start; gap:0.6rem; font-size:0.85rem; color:var(--text2); line-height:1.5; padding:0.35rem 0.6rem; background:var(--bg); border-radius:7px; }
.today-task-emoji { flex-shrink:0; font-size:0.9rem; line-height:1.5; }
.today-task-text { flex:1; }
.today-note { font-family:var(--mono); font-size:0.7rem; color:var(--text3); padding:0.2rem 0.6rem; margin-top:0.1rem; }
.today-empty { text-align:center; padding:1.5rem 1rem; font-size:0.85rem; color:var(--text3); }

/* Print button */
.header-actions { display:flex; gap:0.5rem; align-items:center; margin-top:0.5rem; }
.print-btn { background:var(--bg2); border:1px solid var(--border); color:var(--text3); font-family:var(--mono); font-size:0.7rem; padding:5px 12px; border-radius:6px; cursor:pointer; transition:all 0.2s; display:inline-flex; align-items:center; gap:5px; }
.print-btn:hover { border-color:var(--text3); color:var(--text); }

/* Print styles */
@media print {
  body { background:#fff !important; color:#111 !important; font-size:11pt; }
  .container { max-width:100%; padding:0.5cm; }
  .no-print { display:none !important; }
  .print-page { display:block !important; }
  .print-page h1 { font-family:var(--serif); font-size:18pt; margin-bottom:0.3cm; border-bottom:2pt solid #111; padding-bottom:0.2cm; }
  .print-subject { page-break-inside:avoid; margin-bottom:0.5cm; }
  .print-subject h2 { font-size:13pt; margin:0.3cm 0 0.15cm; color:#333; }
  .print-subject h3 { font-size:11pt; margin:0.2cm 0 0.1cm; color:#555; }
  .print-item { padding:0.08cm 0; padding-left:0.5cm; font-size:10pt; line-height:1.5; display:flex; align-items:flex-start; gap:0.3cm; }
  .print-box { display:inline-block; width:0.35cm; height:0.35cm; border:1.5pt solid #333; border-radius:2px; flex-shrink:0; margin-top:2pt; }
  .print-section { margin-left:0.3cm; margin-bottom:0.2cm; }
  .print-label { font-size:9pt; color:#777; text-transform:uppercase; letter-spacing:0.5pt; margin:0.15cm 0 0.05cm; font-weight:600; }
  .print-meta { font-size:9pt; color:#888; margin-top:0.05cm; }
}

/* Flashcards */
.fc-intro { font-size:0.85rem; color:var(--text2); margin-bottom:1.25rem; line-height:1.6; }
.fc-decks { display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:0.75rem; }
.fc-deck { background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius); padding:1.1rem 1.2rem; cursor:pointer; transition:all 0.2s; }
.fc-deck:hover { border-color:var(--purple); transform:translateY(-2px); }
.fc-deck.combined { background:linear-gradient(135deg,var(--bg2),var(--purpleBg)); border-color:var(--purple)55; }
.fc-deck-top { display:flex; align-items:center; gap:0.5rem; margin-bottom:0.35rem; }
.fc-deck-emoji { font-size:1.3rem; line-height:1; }
.fc-deck-title { font-size:0.95rem; font-weight:700; }
.fc-deck-sub { font-family:var(--mono); font-size:0.65rem; color:var(--text3); margin-bottom:0.75rem; line-height:1.4; }
.fc-deck-bar { background:var(--bg); border-radius:10px; height:6px; overflow:hidden; }
.fc-deck-fill { height:100%; border-radius:10px; background:linear-gradient(90deg,var(--purple),var(--blue)); transition:width 0.5s; }
.fc-deck-meta { font-family:var(--mono); font-size:0.62rem; color:var(--text3); margin-top:4px; }

// ========== GAME CONFIG ==========
const XP = { criterium:10, mustDo:5, shouldDo:3, extra:1 };
const HEAVY = { 'analyse-inttech':1.5, 'analyse-bepaald':1.5, 'ruimtemeetkunde':1.5 };
const LEVELS = [
  { xp:0, title:'Beginner' }, { xp:60, title:'Leerling' }, { xp:150, title:'Rekenaar' },
  { xp:300, title:'Analist' }, { xp:480, title:'Strateeg' }, { xp:680, title:'Meester' }, { xp:900, title:'Held' },
];

// ========== STATE ==========
let checked = JSON.parse(localStorage.getItem('hub-checked') || localStorage.getItem('wisk-checked') || '{}');
let exChecked = JSON.parse(localStorage.getItem('hub-ex-checked') || localStorage.getItem('wisk-ex-checked') || '{}');
let currentSubject = null;

// ========== XP / LEVEL ==========
function subjectXP(key) {
  const s = SUBJECTS[key];
  let xp = 0;
  s.chapters.forEach(ch => {
    const m = HEAVY[ch.id] || 1;
    ch.criteria.forEach((_, i) => { if (checked[ch.id + '-' + i]) xp += XP.criterium * m; });
    if (ch.exercises) ['mustDo','shouldDo','extra'].forEach(t =>
      (ch.exercises[t] || []).forEach((_, j) => { if (exChecked['ex-' + ch.id + '-' + t + '-' + j]) xp += XP[t] * m; }));
  });
  return Math.round(xp);
}
function groupXP(g) {
  return Object.keys(SUBJECTS).filter(k => SUBJECTS[k].group === g).reduce((s, k) => s + subjectXP(k), 0);
}
function levelInfo(xp) {
  let idx = 0;
  for (let i = 0; i < LEVELS.length; i++) if (xp >= LEVELS[i].xp) idx = i;
  const cur = LEVELS[idx], next = LEVELS[idx + 1] || null;
  const pct = next ? Math.round((xp - cur.xp) / (next.xp - cur.xp) * 100) : 100;
  return { level: idx + 1, title: cur.title, nextXp: next ? next.xp : null, pct, xp };
}

// ========== STREAK (per group) ==========
function getStreak(g) {
  const s = JSON.parse(localStorage.getItem('hub-streak-' + g) || '{"count":0,"last":null}');
  if (!s.last) return 0;
  const today = new Date().toISOString().split('T')[0];
  const yest = new Date(Date.now() - 86400000).toISOString().split('T')[0];
  return (s.last === today || s.last === yest) ? s.count : 0;
}
function bumpStreak(g) {
  const today = new Date().toISOString().split('T')[0];
  let s = JSON.parse(localStorage.getItem('hub-streak-' + g) || '{"count":0,"last":null}');
  if (s.last === today) return;
  const yest = new Date(Date.now() - 86400000).toISOString().split('T')[0];
  s.count = (s.last === yest) ? s.count + 1 : 1;
  s.last = today;
  localStorage.setItem('hub-streak-' + g, JSON.stringify(s));
}

// ========== BOSSES (per subject) ==========
function subjectBosses(key) {
  const s = SUBJECTS[key];
  const bosses = [];
  if (key === 'wiskunde') {
    // mini-boss: toets hoeken & afstand
    bosses.push({ id:'miniboss', emoji:'👾', name:'Toets: Hoeken & Afstand', type:'Mini-boss · di 2/6', mini:true });
    // one boss per exam
    bosses.push({ id:'exam1', emoji:'🐉', name:'Examen Deel 1', type:'Boss · wo 10/6 · lin. algebra, analyse, kans', exam:1 });
    bosses.push({ id:'exam2', emoji:'🐙', name:'Examen Deel 2', type:'Boss · do 11/6 · ruimte, logica, alg. structuren', exam:2 });
    return bosses;
  }
  const phases = [...new Set(s.chapters.map(c => c.phase))].filter(p => p != null);
  const emojis = ['🐉','🦂','🐙','👹','🦖'];
  phases.forEach((p, i) => {
    const lbl = s.chapters.find(c => c.phase === p && c.phaseLabel);
    bosses.push({ id:'phase'+p, emoji:emojis[i % emojis.length], name:(lbl ? lbl.phaseLabel.replace(/^Fase \d+ — /,'') : ('Fase '+p)), type:'Boss', phase:p });
  });
  return bosses;
}
function bossStats(key, boss) {
  const s = SUBJECTS[key];
  let total = 0, done = 0;
  if (boss.mini) {
    [4,5].forEach(i => { total++; if (checked['ruimtemeetkunde-' + i]) done++; });
    [3,4].forEach(j => { total++; if (exChecked['ex-ruimtemeetkunde-mustDo-' + j]) done++; });
  } else {
    const filt = boss.exam != null ? (c => c.exam === boss.exam) : (c => c.phase === boss.phase);
    s.chapters.filter(filt).forEach(ch => {
      ch.criteria.forEach((_, i) => { total++; if (checked[ch.id + '-' + i]) done++; });
      if (ch.exercises) ['mustDo','shouldDo','extra'].forEach(t =>
        (ch.exercises[t] || []).forEach((_, j) => { total++; if (exChecked['ex-' + ch.id + '-' + t + '-' + j]) done++; }));
    });
  }
  const hp = total > 0 ? Math.max(0, Math.round((1 - done / total) * 100)) : 100;
  return { hp, done, total };
}

// ========== PROGRESS (per subject) ==========
function subjectProgress(key) {
  const s = SUBJECTS[key];
  let cTotal=0, cDone=0, eTotal=0, eDone=0;
  s.chapters.forEach(ch => {
    ch.criteria.forEach((_, i) => { cTotal++; if (checked[ch.id + '-' + i]) cDone++; });
    if (ch.exercises) ['mustDo','shouldDo','extra'].forEach(t =>
      (ch.exercises[t] || []).forEach((_, j) => { eTotal++; if (exChecked['ex-' + ch.id + '-' + t + '-' + j]) eDone++; }));
  });
  return { cTotal, cDone, eTotal, eDone };
}

function toggleEx(id) {
  exChecked[id] = !exChecked[id];
  const el = document.getElementById(id);
  if (el) { el.classList.toggle('checked', !!exChecked[id]); el.textContent = exChecked[id] ? '✓' : '';

  if (exChecked[id] && currentSubject) bumpStreak(SUBJECTS[currentSubject].group);

  refreshDetail();
}

function getFcKnown() { try { return JSON.parse(localStorage.getItem('hub-fc-known') || '{}'); } catch(e) { return {}; } }
function saveFcKnown(k) { localStorage.setItem('hub-fc-known', JSON.stringify(k)); }

function getAllDecks() {
  const themeDecks = SUBJECTS[currentSubject].flashcards || [];
  const vocCards = [], gramCards = [];
  themeDecks.forEach(d => d.cards.forEach(c => {
    if (c.t === 'voc') vocCards.push(c);
    else if (c.t === 'gram') gramCards.push(c);
  }));
  const allCards = [];
  themeDecks.forEach(d => d.cards.forEach(c => { if (c.t === 'voc' || c.t === 'gram') allCards.push(c); }));
  return [
    ...themeDecks,
    { id:'fc-voc-all', title:'Alle vocabulaire', emoji:'📚', sub:'Alle woordenschat samen', cards:vocCards },
    { id:'fc-gram-all', title:'Alle grammatica', emoji:'📐', sub:'Alle grammaticaregels samen', cards:gramCards },
    { id:'fc-all', title:'Alles door elkaar', emoji:'🎲', sub:'Volledige examenstof — voc + grammatica gemengd', cards:allCards },
  ];
}

function renderFlashcards() {
  const s = SUBJECTS[currentSubject];
  const container = document.getElementById('sec-flashcards');
  if (!s.flashcards) { container.innerHTML = ''; return; }
  if (fcDeck) { renderFcStudy(); return; }
  const decks = getAllDecks();

  let html = '<div class="fc-intro">Klik op een deck om te oefenen. Draai elke kaart om, beoordeel jezelf eerlijk, en de hub onthoudt wat je al kent. De laatste twee decks bundelen alle woordenschat en grammatica samen.</div>';
  html += '<div class="fc-decks">';
  decks.forEach(d => {
    const total = d.cards.length;
    const knownCount = d.cards.filter(c => known[c.q]).length;
    const pct = total ? Math.round(knownCount/total*100) : 0;
    const isCombined = d.id.endsWith('-all');
    html += `<div class="fc-deck${isCombined?' combined':''}" onclick="openDeck('${d.id}')">
      <div class="fc-deck-top"><span class="fc-deck-emoji">${d.emoji}</span><span class="fc-deck-title">${d.title}</span></div>
      <div class="fc-deck-sub">${d.sub}</div>

      <div class="fc-deck-meta">${knownCount}/${total} gekend</div>
    </div>`;
  });
  html += '</div>';
  container.innerHTML = html;
}

function openDeck(id) {
  const decks = getAllDecks();
  fcDeck = decks.find(d => d.id === id);
  if (!fcDeck) return;
  fcOrder = fcDeck.cards.map((_, i) => i);
  fcPos = 0; fcFlipped = false;
  if (id === 'fc-all') {
    for (let i = fcOrder.length - 1; i > 0; i--) { const j = Math.floor(Math.random()*(i+1)); [fcOrder[i],fcOrder[j]]=[fcOrder[j],fcOrder[i]]; }
  }
  renderFcStudy();
}

function fcBackToDecks() { fcDeck = null; renderFlashcards(); }
function fcShuffle() {
  for (let i = fcOrder.length - 1; i > 0; i--) { const j = Math.floor(Math.random()*(i+1)); [fcOrder[i],fcOrder[j]]=[fcOrder[j],fcOrder[i]]; }
  fcPos = 0; fcFlipped = false; renderFcStudy();
}
function fcFlip() { fcFlipped = !fcFlipped; renderFcStudy(); }
function fcNext() { if (fcPos < fcOrder.length-1) { fcPos++; fcFlipped = false; renderFcStudy(); } }
function fcPrev() { if (fcPos > 0) { fcPos--; fcFlipped = false; renderFcStudy(); } }
function fcGrade(isKnown) {
  const card = fcDeck.cards[fcOrder[fcPos]];
  const known = getFcKnown();
  if (isKnown) known[card.q] = true; else delete known[card.q];
  saveFcKnown(known);
  if (fcPos < fcOrder.length-1) { fcPos++; fcFlipped = false; renderFcStudy(); }
  else renderFcStudy();
}
function fcResetDeck() {
  if (!confirm('Voortgang van dit deck resetten?')) return;
  const known = getFcKnown();
  fcDeck.cards.forEach(c => delete known[c.q]);
  saveFcKnown(known);
  fcPos = 0; fcFlipped = false; renderFcStudy();
}

function renderFcStudy() {
  const container = document.getElementById('sec-flashcards');

  let html = `<div class="fc-study-head">
    <div class="fc-study-title">${fcDeck.emoji} ${fcDeck.title}</div>
    <div class="fc-study-actions">
      <button class="fc-mini-btn" onclick="fcShuffle()">🔀 Shuffle</button>
      <button class="fc-mini-btn" onclick="fcResetDeck()">↺ Reset</button>
      <button class="fc-mini-btn" onclick="fcBackToDecks()">← Decks</button>
    </div>
  </div>
  <div class="fc-progress"><span>${knownCount}/${total} gekend</span><span>${pct}%</span></div>
  <div class="fc-progress-bar"><div class="fc-progress-fill" style="width:${pct}%"></div></div>`;

  const longCls = card.t === 'exam' ? ' long' : '';
  if (!fcFlipped) {
    html += `<div class="fc-card${longCls}${cardKnown?' is-known':''}" onclick="fcFlip()">
      <div class="fc-card-side">Vraag</div>
      ${cardKnown?'<div class="fc-card-known-badge">✅</div>':''}
      <div class="fc-card-q">${card.q}</div>
      <div class="fc-card-hint">tik om om te draaien</div>
    </div>`;
  } else {
    html += `<div class="fc-card${longCls}${cardKnown?' is-known':''}" onclick="fcFlip()">
      <div class="fc-card-side">Antwoord</div>
      ${cardKnown?'<div class="fc-card-known-badge">✅</div>':''}
      <div class="fc-card-a">${card.a}</div>
      <div class="fc-card-hint">tik om terug te draaien</div>
    </div>
    <div class="fc-controls">
      <button class="fc-grade-btn no" onclick="fcGrade(false)">↻ Nog oefenen</button>
      <button class="fc-grade-btn yes" onclick="fcGrade(true)">✓ Ken ik</button>
    </div>`;
  }

  html += `<div class="fc-nav">
    <button class="fc-nav-btn" onclick="fcPrev()" ${fcPos===0?'disabled':''}>← Vorige</button>
    <span class="fc-nav-pos">${fcPos+1} / ${total}</span>
    <button class="fc-nav-btn" onclick="fcNext()" ${fcPos===total-1?'disabled':''}>Volgende →</button>
  </div>`;

  container.innerHTML = html;
}

  if (qzActive) { renderQzQuestion(); return; }
  container.innerHTML = `<div class="qz-intro">
    <h3>📝 Examenquiz Frans</h3>
    <p>${s.quiz.length} meerkeuzevragen, allemaal rechtstreeks uit het schriftelijke examen. Vragen en antwoorden worden geschud.</p>
    <button class="qz-start-btn" onclick="qzStart()">Start de quiz</button>
  </div>`;
}

function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length-1; i > 0; i--) { const j = Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
  return a;
}

function qzStart() {
  const s = SUBJECTS[currentSubject];
  qzActive = true;
  qzOrder = shuffle(s.quiz.map((_, i) => i));
  qzPos = 0; qzScore = 0; qzAnswered = false;
  prepQzOptions();
  renderQzQuestion();
}
function prepQzOptions() {
  const q = SUBJECTS[currentSubject].quiz[qzOrder[qzPos]];
  qzOpts = shuffle(q.options);
}
function qzAnswer(choice) {
  if (qzAnswered) return;
  qzAnswered = true;
  const q = SUBJECTS[currentSubject].quiz[qzOrder[qzPos]];
  if (choice === q.a) qzScore++;
  renderQzQuestion(choice);
}
function qzNext() {
  if (qzPos < qzOrder.length-1) { qzPos++; qzAnswered = false; prepQzOptions(); renderQzQuestion(); }
  else renderQzResult();
}
function qzRestart() { qzActive = false; renderQuiz(); }

function renderQzQuestion(choice) {
  const container = document.getElementById('sec-quiz');
  const s = SUBJECTS[currentSubject];
  const q = s.quiz[qzOrder[qzPos]];
  const total = qzOrder.length;
  const pct = Math.round(qzPos / total * 100);
  const letters = ['A','B','C','D','E'];

  let html = `<div class="qz-progress"><span>Vraag ${qzPos+1} / ${total}</span><span>Score: ${qzScore}</span></div>
    <div class="qz-progress-bar"><div class="qz-progress-fill" style="width:${pct}%"></div></div>
    <div class="qz-src">Examen ${q.src}</div>
    <div class="qz-question">${q.q}</div>
    <div class="qz-options">`;
  qzOpts.forEach((opt, i) => {
    let cls = '';
    if (qzAnswered) {
      if (opt === q.a) cls = ' correct';
      else if (opt === choice) cls = ' wrong';
    }
    html += `<button class="qz-option${cls}" ${qzAnswered?'disabled':''} onclick="qzAnswer('${opt.replace(/'/g,"\\'")}')">
      <span class="qz-letter">${letters[i]}</span><span>${opt}</span></button>`;
  });
  html += '</div>';

  if (qzAnswered) {
    const correct = choice === q.a;
    html += `<div class="qz-explain ${correct?'ok':'no'}">${correct?'✓ Juist! ':'✗ '}${q.explain}</div>
      <button class="qz-next" onclick="qzNext()">${qzPos < total-1 ? 'Volgende vraag →' : 'Bekijk resultaat →'}</button>`;
  }
  container.innerHTML = html;
}

function renderQzResult() {
  const container = document.getElementById('sec-quiz');
  const total = qzOrder.length;
  const pct = Math.round(qzScore / total * 100);
  let emoji, msg;
  if (pct >= 85) { emoji = '🏆'; msg = 'Uitstekend! Je beheerst de examenstof.'; }
  else if (pct >= 70) { emoji = '👏'; msg = 'Goed bezig! Nog een paar puntjes bijschaven.'; }
  else if (pct >= 50) { emoji = '💪'; msg = 'Op weg — herhaal de flashcards en probeer opnieuw.'; }
  else { emoji = '📚'; msg = 'Nog wat werk. Oefen de flashcards en kom terug.'; }
  container.innerHTML = `<div class="qz-result">
    <div class="big">${emoji}</div>
    <div class="qz-result-score">${qzScore}/${total}</div>
    <div class="qz-result-msg">${pct}% · ${msg}</div>
    <button class="qz-result-btn" onclick="qzStart()">Opnieuw proberen</button>
  </div>`;
  qzActive = false;
}

function renderDetail() {
  renderDetailHeader();
  renderHud();
  renderChapters();
  renderGame();
  renderFormulas();
  renderPlanning();
  renderFlashcards();
  renderQuiz();
}

function renderChapters() {
  const s = SUBJECTS[currentSubject];
  const container = document.getElementById('sec-volgorde');
  if (!s.chapters.length) { container.innerHTML = emptyState('Nog geen leerstof toegevoegd voor dit vak.'); return; }
  let html = '<div class="reset-row"><button class="reset-btn" onclick="resetSubject()">↺ Reset voortgang</button></div>';
  let currentPhase = 0, currentExam = 0;
  s.chapters.forEach(ch => {
    if (ch.exam && ch.exam !== currentExam) {
      currentExam = ch.exam;
      const examInfo = currentExam === 1
        ? { d:'wo 10/6', desc:'Lineaire algebra · Analyse · Kanstheorie' }
        : { d:'do 11/6', desc:'Ruimtemeetkunde · Logica · Algebraïsche structuren · Statistiek · Complexe getallen' };
      html += `<div class="exam-banner">
        <div class="exam-banner-title">🎯 Examen Deel ${currentExam} <span>${examInfo.d}</span></div>
        <div class="exam-banner-desc">${examInfo.desc}</div>
      </div>`;
      currentPhase = 0; // reset phase labels within each exam block
    }
    if (ch.phaseLabel && ch.phase !== currentPhase) {
      currentPhase = ch.phase;
      html += `<div class="phase phase-${ch.phase}">${ch.phaseLabel}</div>`;
    }
    const allDone = ch.criteria.every((_, i) => checked[ch.id + '-' + i]);
    html += `<div class="chapter ${allDone?'completed':''}" id="ch-${ch.id}">
      <div class="chapter-header" onclick="toggleChapter('${ch.id}')">
        <div class="chapter-number" style="background:${ch.color}22;color:${ch.color}">${ch.number}</div>
        <div class="chapter-info"><div class="chapter-title">${ch.title}</div>
          <div class="chapter-meta">${ch.pages} · ${ch.hours}u · ${ch.criteria.length} criteria</div></div>
        <div class="chapter-toggle">▼</div>
      </div><div class="chapter-body"><div class="chapter-content">`;
    ch.criteria.forEach((c, i) => {
      const cid = ch.id + '-' + i, done = !!checked[cid];
      html += `<div class="criteria-item">
        <div class="criteria-check ${done?'checked':''}" id="chk-${cid}" onclick="event.stopPropagation();toggleCheck('${cid}')">${done?'✓':''}</div>
        <span class="criteria-text ${done?'done':''}" id="txt-${cid}">${c}</span></div>`;
    });
    if (ch.exercises) {
      const tiers = [{key:'mustDo',label:'Must-do',color:'var(--red)'},{key:'shouldDo',label:'Should-do',color:'var(--orange)'},{key:'extra',label:'Extra',color:'var(--text3)'}];
      html += `<div class="exercises"><strong>Oefeningen</strong>`;
      tiers.forEach(tier => {
        const list = ch.exercises[tier.key] || [];
        if (!list.length) return;
        html += `<div class="ex-tier"><div class="ex-tier-label" style="color:${tier.color}">${tier.label}</div>`;
        list.forEach((ex, j) => {
          const exid = 'ex-' + ch.id + '-' + tier.key + '-' + j, done = !!exChecked[exid];
          html += `<div class="ex-item"><div class="ex-check ${done?'checked':''}" id="${exid}" onclick="event.stopPropagation();toggleEx('${exid}')">${done?'✓':''}</div><span class="ex-text ${done?'done':''}">${ex}</span></div>`;
        });
        html += `</div>`;
      });
      html += `</div>`;
    }
    if (ch.tip) html += `<div class="tip">💡 ${ch.tip}</div>`;
    if (ch.jarvis) html += `<div class="jarvis" onclick="copyJarvis(this, \`${ch.jarvis.replace(/`/g,"'")}\`)">🤖 Jarvis: "${ch.jarvis}"</div>`;
    html += `</div></div></div>`;
  });
  container.innerHTML = html;
}

function renderFormulas() {
  const s = SUBJECTS[currentSubject];
  const container = document.getElementById('sec-formules');
  const withF = s.chapters.filter(ch => ch.formulas && ch.formulas.length);
  if (!withF.length) { container.innerHTML = emptyState('Nog geen formules toegevoegd voor dit vak.'); return; }
  let html = '';
  withF.forEach(ch => {
    html += `<div class="formula-card"><h3><span class="dot" style="background:${ch.color}"></span>${ch.title}</h3>`;
    ch.formulas.forEach(f => html += `<div class="formula-item"><span class="formula-name">${f.name}:</span> ${f.formula}</div>`);
    html += `</div>`;
  });
  container.innerHTML = html;
}

function renderPlanning() {
  const s = SUBJECTS[currentSubject];
  const container = document.getElementById('sec-planning');
  if (!s.planning || !s.planning.length) { container.innerHTML = emptyState('Nog geen planning toegevoegd voor dit vak.'); return; }
  let html = '';
  s.planning.forEach(p => {
    const isExam = p.tasks.some(t => t.includes('EXAMEN'));
    html += `<div class="day-card" style="${isExam?'border-color:var(--red);background:var(--redBg)':''}">
      <h3>${p.day} ${p.note?'<span class="day-date">'+p.note+'</span>':''}</h3>
      <div class="day-tasks">${p.tasks.map(t => {
        let c = '#888';
        if (t.includes('EXAMEN')||t.includes('TOETS')) c='var(--red)';
        else if (t.includes('REVIEW')||t.includes('FINALE')) c='var(--orange)';
        else if (t.startsWith('✓')) c='var(--green)';
        return `<div style="color:${c}">→ ${t}</div>`;
      }).join('')}</div></div>`;
  });
  container.innerHTML = html;
}

function renderGame() {
  const key = currentSubject, s = SUBJECTS[key], g = s.group;
  const container = document.getElementById('sec-game');
  const xp = groupXP(g), lvl = levelInfo(xp), streak = getStreak(g);
  let html = `<div class="game-intro">XP en streak gelden voor de hele groep <strong>${GROUPS[g].name}</strong>. Versla de bosses van dit vak door hun HP naar 0 te brengen.</div>`;
  html += `<div class="level-card"><div class="level-badge">${lvl.level}</div><div class="level-title">${lvl.title} — ${GROUPS[g].name}</div>
    <div class="level-xp">${xp} XP totaal</div><div class="level-bar"><div class="level-fill" style="width:${lvl.pct}%"></div></div>
    <div class="level-next">${lvl.nextXp?'Nog '+(lvl.nextXp-xp)+' XP tot level '+(lvl.level+1):'Maximaal level! 🏆'}</div></div>`;
  html += `<div class="hud-card" style="margin-bottom:1rem"><div class="hud-icon">${streak>=1?'🔥':'💨'}</div><div class="hud-body">
    <div class="hud-top"><span class="hud-title">${streak} dag${streak===1?'':'en'} op rij</span></div>
    <div class="hud-sub">${streak===0?'Vink vandaag iets af om te starten!':streak>=7?'On fire! 🔥':'Mooi bezig — niet onderbreken!'}</div></div></div>`;
  if (s.chapters.length) {
    html += `<div class="section-heading">Boss battles</div>`;
    subjectBosses(key).forEach(boss => {
      const st = bossStats(key, boss), defeated = st.hp === 0;
      const hpClass = st.hp <= 30 ? 'low' : st.hp <= 65 ? 'mid' : '';
      html += `<div class="boss ${defeated?'defeated':''}">
        <div class="boss-top"><div class="boss-emoji">${defeated?'🏆':boss.emoji}</div>
          <div class="boss-info"><div class="boss-name">${boss.name}</div><div class="boss-type">${boss.type}</div></div>
          <div class="boss-hp-label" style="color:${defeated?'var(--green)':'var(--text2)'}">${defeated?'VERSLAGEN':'HP '+st.hp+'%'}</div></div>
        ${defeated?'':`<div class="hp-bar"><div class="hp-fill ${hpClass}" style="width:${st.hp}%"></div></div>`}
        ${defeated?`<div class="boss-defeated-label">✓ Verslagen — ${st.done}/${st.total} voltooid</div>`:`<div class="boss-meta">${st.done}/${st.total} taken · nog ${st.total-st.done} te gaan</div>`}
      </div>`;
    });
  }
  html += `<div class="section-heading">Hoe verdien je XP?</div><div class="rules-card">
    <strong>Per actie:</strong><br>Succescriterium — <span class="xp-pill">+10 XP</span><br>Must-do oefening — <span class="xp-pill">+5 XP</span><br>
    Should-do — <span class="xp-pill">+3 XP</span><br>Extra — <span class="xp-pill">+1 XP</span><br><br>
    <strong>Bonus:</strong> de zwaarste blokken geven <span class="xp-pill">×1.5 XP</span>.</div>`;
  container.innerHTML = html;
}

function emptyState(msg) {
  return `<div class="empty-state"><div class="big">🚧</div>${msg}<br><span style="font-size:0.75rem">De structuur staat klaar — leerstof kan later toegevoegd worden.</span></div>`;
}

// ========== INTERACTIONS ==========
function toggleChapter(id) { document.getElementById('ch-' + id).classList.toggle('open'); }
function showSection(name) {
  document.querySelectorAll('#view-subject .section').forEach(s => s.classList.remove('active'));
  document.getElementById('sec-' + name).classList.add('active');
  document.querySelectorAll('#detailNav button').forEach(b => b.classList.toggle('active', b.dataset.tab === name));
}
function copyJarvis(el, text) { navigator.clipboard.writeText(text).then(() => { el.classList.add('copied'); setTimeout(() => el.classList.remove('copied'), 2000); }); }
function resetSubject() {
  const s = SUBJECTS[currentSubject];
  if (!confirm('Voortgang van ' + s.name + ' resetten? (criteria én oefeningen)')) return;
  s.chapters.forEach(ch => {
    ch.criteria.forEach((_, i) => delete checked[ch.id + '-' + i]);
    if (ch.exercises) ['mustDo','shouldDo','extra'].forEach(t => (ch.exercises[t]||[]).forEach((_, j) => delete exChecked['ex-' + ch.id + '-' + t + '-' + j]));
  });
  saveChecked(); saveEx();
  renderDetail();
}


// ========== TODAY OVERVIEW ==========
function parsePlanDate(dayStr) {
  // Extract all dd/m dates from a string
  const matches = [...dayStr.matchAll(/(\d{1,2})\/(\d{1,2})/g)];
  return matches.map(m => new Date(2026, parseInt(m[2])-1, parseInt(m[1])));
}

function renderToday() {
  const container = document.getElementById('today');
  if (!container) return;
  const now = new Date();
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const dayNames = ['Zo','Ma','Di','Wo','Do','Vr','Za'];

  let todayTasks = [];
  let nextTasks = [];
  let nextDate = null;

  Object.entries(SUBJECTS).forEach(([key, s]) => {
    if (!s.active || !s.planning) return;
    s.planning.forEach(p => {
      const dayStr = p.day;
      const isRange = dayStr.includes('→');
      const hasNu = dayStr.toLowerCase().includes('nu');

      if (isRange) {
        const dates = parsePlanDate(dayStr);
        const startDate = hasNu ? today : (dates[0] || today);
        const endDate = dates.length >= 2 ? dates[dates.length-1] : (dates[0] || today);
        if (today >= startDate && today <= endDate) {
          todayTasks.push({ subject:s, tasks:p.tasks, note:p.note });
        } else if (startDate > today && (!nextDate || startDate < nextDate)) {
          nextDate = startDate;
          nextTasks = [{ subject:s, tasks:p.tasks, note:p.note }];
        } else if (startDate > today && nextDate && startDate.getTime() === nextDate.getTime()) {
          nextTasks.push({ subject:s, tasks:p.tasks, note:p.note });
        }
      } else {
        const dates = parsePlanDate(dayStr);
        if (dates.length && dates[0].getTime() === today.getTime()) {
          todayTasks.push({ subject:s, tasks:p.tasks, note:p.note });
        } else if (dates.length && dates[0] > today && (!nextDate || dates[0] < nextDate)) {
          nextDate = dates[0];
          nextTasks = [{ subject:s, tasks:p.tasks, note:p.note }];
        } else if (dates.length && dates[0] > today && nextDate && dates[0].getTime() === nextDate.getTime()) {
          nextTasks.push({ subject:s, tasks:p.tasks, note:p.note });
        }
      }
    });
  });

  const items = todayTasks.length > 0 ? todayTasks : nextTasks;
  const isToday = todayTasks.length > 0;

  if (items.length === 0) { container.innerHTML = ''; return; }

  const label = isToday ? '📋 Vandaag studeren' : '📋 Eerstvolgende studiedag';
  const dateLabel = !isToday && nextDate ? `${dayNames[nextDate.getDay()]} ${nextDate.getDate()}/${nextDate.getMonth()+1}` : '';

  let html = `<div class="today-card">
    <div class="today-header"><span class="today-title">${label}</span><span class="today-date">${dateLabel}</span></div>
    <div class="today-tasks">`;
  items.forEach(item => {
    item.tasks.forEach(task => {
      html += `<div class="today-task"><span class="today-task-emoji">${item.subject.emoji}</span><span class="today-task-text">${task}</span></div>`;
    });
    if (item.note) html += `<div class="today-note">💡 ${item.note}</div>`;
  });
  html += '</div></div>';
  container.innerHTML = html;
}

// ========== PRINTABLE CHECKLIST ==========
function printChecklist() {
  const pp = document.getElementById('printPage');
  let html = '<h1>Examenhub — Afvink-checklist</h1>';
  html += '<p class="print-meta">Gegenereerd op ' + new Date().toLocaleDateString('nl-BE') + ' — alleen niet-afgevinkte items</p>';

  Object.entries(SUBJECTS).forEach(([key, s]) => {
    if (!s.active) return;
    const checked = JSON.parse(localStorage.getItem('hub-checked') || '{}');
    const exChecked = JSON.parse(localStorage.getItem('hub-ex-checked') || '{}');

    let subHtml = '';
    let hasUnchecked = false;

    s.chapters.forEach(ch => {
      let chHtml = '';
      // Unchecked criteria
      ch.criteria.forEach((cr, ci) => {
        const ck = key + '::' + ch.id + '::c' + ci;
        if (!checked[ck]) {
          chHtml += `<div class="print-item"><span class="print-box"></span><span>${cr}</span></div>`;
          hasUnchecked = true;
        }
      });
      // Unchecked exercises
      let exHtml = '';
      ['mustDo','shouldDo','extra'].forEach(tier => {
        const items = ch.exercises[tier] || [];
        items.forEach((ex, ei) => {
          const ek = key + '::' + ch.id + '::' + tier + '::e' + ei;
          if (!exChecked[ek]) {
            if (!exHtml) exHtml = '';
            const label = tier === 'mustDo' ? 'Must-do' : tier === 'shouldDo' ? 'Should-do' : 'Extra';
            exHtml += `<div class="print-item"><span class="print-box"></span><span>[${label}] ${ex}</span></div>`;
            hasUnchecked = true;
          }
        });
      });

      if (chHtml || exHtml) {
        subHtml += `<h3>${ch.number}. ${ch.title}</h3><div class="print-section">${chHtml}${exHtml}</div>`;
      }
    });

    if (hasUnchecked) {
      const exam = s.exams[0];
      const d = Math.ceil((new Date(exam.date) - new Date()) / 86400000);
      html += `<div class="print-subject"><h2>${s.emoji} ${s.name} — D-${d}</h2>${subHtml}</div>`;
    }
  });

  pp.innerHTML = html;
  pp.style.display = 'block';
  // Hide non-print elements
  document.querySelectorAll('.container > *:not(.print-page)').forEach(el => el.classList.add('no-print'));
  window.print();
  // Restore after print
  setTimeout(() => {
    document.querySelectorAll('.no-print').forEach(el => el.classList.remove('no-print'));
    pp.style.display = 'none';
  }, 500);
}

function renderHub() { renderHeader(); renderToday(); renderCountdown(); renderGroups(); }

// ========== INIT ==========
renderHub();
</script>
