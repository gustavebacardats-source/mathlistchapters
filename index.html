<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wiskunde 6AWWI — Examenplan</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Instrument+Serif&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0c0c10;
  --bg2: #14141c;
  --bg3: #1c1c28;
  --border: #2a2a3a;
  --text: #e4e2dd;
  --text2: #a8a5a0;
  --text3: #6b6860;
  --red: #e8453c;
  --orange: #e8943c;
  --green: #3cb06c;
  --blue: #3c8ce8;
  --purple: #9c6ce8;
  --yellow: #e8c83c;
  --redBg: #e8453c15;
  --orangeBg: #e8943c15;
  --greenBg: #3cb06c15;
  --blueBg: #3c8ce815;
  --purpleBg: #9c6ce815;
  --radius: 10px;
  --mono: 'DM Mono', monospace;
  --serif: 'Instrument Serif', serif;
  --sans: 'DM Sans', sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}
::selection { background: var(--red); color: #fff; }
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

.container { max-width: 800px; margin: 0 auto; padding: 2rem 1.5rem; }

/* Header */
header { padding: 3rem 0 2rem; border-bottom: 1px solid var(--border); margin-bottom: 2rem; }
header h1 {
  font-family: var(--serif);
  font-size: clamp(2.5rem, 6vw, 4rem);
  font-weight: 400;
  letter-spacing: -2px;
  line-height: 1.1;
  margin-bottom: 0.5rem;
}
header h1 span { color: var(--red); }
header p { font-size: 0.9rem; color: var(--text3); font-family: var(--mono); font-size: 0.8rem; }

/* Progress */
.progress-bar {
  margin: 1.5rem 0;
  background: var(--bg3);
  border-radius: 20px;
  height: 8px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--red), var(--orange));
  border-radius: 20px;
  transition: width 0.6s cubic-bezier(0.16, 1, 0.3, 1);
}
.progress-label {
  display: flex;
  justify-content: space-between;
  font-family: var(--mono);
  font-size: 0.75rem;
  color: var(--text3);
  margin-top: 0.4rem;
}

/* Stats */
.stats {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 0.75rem;
  margin-bottom: 2rem;
}
.stat {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1rem;
  text-align: center;
}
.stat-number {
  font-family: var(--serif);
  font-size: 2rem;
  font-weight: 400;
}
.stat-label {
  font-family: var(--mono);
  font-size: 0.7rem;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-top: 0.2rem;
}

/* Nav */
nav {
  display: flex;
  gap: 0.25rem;
  margin-bottom: 2rem;
  background: var(--bg2);
  border-radius: var(--radius);
  padding: 4px;
  border: 1px solid var(--border);
}
nav button {
  flex: 1;
  padding: 0.6rem 0.5rem;
  border: none;
  border-radius: 7px;
  background: transparent;
  color: var(--text3);
  font-family: var(--sans);
  font-size: 0.8rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
}
nav button.active {
  background: var(--bg);
  color: var(--text);
  box-shadow: 0 2px 8px #0005;
}
nav button:hover:not(.active) { color: var(--text2); }

/* Sections */
.section { display: none; }
.section.active { display: block; }

/* Phase label */
.phase {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 4px 12px;
  border-radius: 20px;
  font-family: var(--mono);
  font-size: 0.7rem;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 0.75rem;
}
.phase-1 { background: var(--redBg); color: var(--red); }
.phase-2 { background: var(--orangeBg); color: var(--orange); }
.phase-3 { background: var(--blueBg); color: var(--blue); }

/* Chapter card */
.chapter {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 0.5rem;
  overflow: hidden;
  transition: border-color 0.2s;
}
.chapter:hover { border-color: #3a3a4a; }
.chapter.completed { opacity: 0.5; }
.chapter-header {
  padding: 1rem 1.25rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 0.75rem;
  user-select: none;
}
.chapter-number {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--mono);
  font-size: 0.75rem;
  font-weight: 500;
  flex-shrink: 0;
}
.chapter-info { flex: 1; min-width: 0; }
.chapter-title {
  font-weight: 600;
  font-size: 0.95rem;
  line-height: 1.3;
}
.chapter-meta {
  font-family: var(--mono);
  font-size: 0.7rem;
  color: var(--text3);
  margin-top: 2px;
}
.chapter-toggle {
  font-size: 0.8rem;
  color: var(--text3);
  transition: transform 0.3s;
  flex-shrink: 0;
}
.chapter.open .chapter-toggle { transform: rotate(180deg); }

.chapter-body {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.4s cubic-bezier(0.16, 1, 0.3, 1);
}
.chapter.open .chapter-body { max-height: 2000px; }
.chapter-content {
  padding: 0 1.25rem 1.25rem;
  border-top: 1px solid var(--border);
  padding-top: 1rem;
}

/* Criteria */
.criteria-item {
  display: flex;
  align-items: flex-start;
  gap: 0.6rem;
  padding: 0.5rem 0;
  font-size: 0.85rem;
  color: var(--text2);
  line-height: 1.5;
}
.criteria-check {
  width: 20px;
  height: 20px;
  border-radius: 5px;
  border: 2px solid var(--border);
  cursor: pointer;
  flex-shrink: 0;
  margin-top: 2px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.7rem;
  transition: all 0.2s;
  background: transparent;
  color: transparent;
}
.criteria-check:hover { border-color: var(--text3); }
.criteria-check.checked {
  background: var(--green);
  border-color: var(--green);
  color: #fff;
}
.criteria-text.done { text-decoration: line-through; color: var(--text3); }

.exercises {
  margin-top: 0.75rem;
  padding: 0.75rem 1rem;
  background: var(--bg3);
  border-radius: 7px;
  font-size: 0.8rem;
  color: var(--text2);
  line-height: 1.7;
}
.exercises strong { color: var(--text); font-weight: 500; }
.ex-tier { margin-top: 0.6rem; }
.ex-tier-label {
  font-family: var(--mono);
  font-size: 0.65rem;
  text-transform: uppercase;
  letter-spacing: 1px;
  font-weight: 500;
  margin-bottom: 0.3rem;
}
.ex-item {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  padding: 0.2rem 0;
  font-size: 0.8rem;
  color: var(--text2);
}
.ex-check {
  width: 17px;
  height: 17px;
  border-radius: 4px;
  border: 2px solid var(--border);
  cursor: pointer;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.6rem;
  transition: all 0.2s;
  background: transparent;
  color: transparent;
}
.ex-check:hover { border-color: var(--text3); }
.ex-check.checked {
  background: var(--blue);
  border-color: var(--blue);
  color: #fff;
}
.ex-text { font-family: var(--mono); font-size: 0.75rem; }
.ex-text.done { text-decoration: line-through; color: var(--text3); }

.tip {
  margin-top: 0.75rem;
  padding: 0.6rem 1rem;
  border-left: 3px solid var(--orange);
  background: var(--orangeBg);
  border-radius: 0 7px 7px 0;
  font-size: 0.8rem;
  color: var(--orange);
  line-height: 1.5;
}

/* Jarvis prompts */
.jarvis {
  margin-top: 0.75rem;
  padding: 0.6rem 1rem;
  border-left: 3px solid var(--purple);
  background: var(--purpleBg);
  border-radius: 0 7px 7px 0;
  font-size: 0.8rem;
  color: var(--purple);
  line-height: 1.5;
  cursor: pointer;
  position: relative;
}
.jarvis::after {
  content: 'kopieer';
  position: absolute;
  right: 10px;
  top: 50%;
  transform: translateY(-50%);
  font-family: var(--mono);
  font-size: 0.65rem;
  opacity: 0.5;
}
.jarvis:hover::after { opacity: 1; }
.jarvis.copied::after { content: 'gekopieerd ✓'; color: var(--green); }

/* Formules section */
.formula-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1.25rem;
  margin-bottom: 0.5rem;
}
.formula-card h3 {
  font-size: 0.9rem;
  font-weight: 600;
  margin-bottom: 0.75rem;
  display: flex;
  align-items: center;
  gap: 0.5rem;
}
.formula-card h3 .dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}
.formula-item {
  font-family: var(--mono);
  font-size: 0.8rem;
  color: var(--text2);
  padding: 0.4rem 0;
  line-height: 1.6;
  border-bottom: 1px solid var(--border);
}
.formula-item:last-child { border: none; }
.formula-name { color: var(--text); font-family: var(--sans); font-weight: 500; }

/* Planning view */
.day-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1rem 1.25rem;
  margin-bottom: 0.5rem;
}
.day-card h3 {
  font-size: 0.9rem;
  font-weight: 600;
  margin-bottom: 0.5rem;
}
.day-card .day-date {
  font-family: var(--mono);
  font-size: 0.7rem;
  color: var(--text3);
}
.day-tasks {
  font-size: 0.85rem;
  color: var(--text2);
  line-height: 1.8;
}
.day-tasks span.subj {
  font-weight: 600;
  font-size: 0.75rem;
  padding: 1px 6px;
  border-radius: 4px;
  margin-right: 4px;
}

/* Reset button */
.reset-btn {
  background: var(--bg3);
  border: 1px solid var(--border);
  color: var(--text3);
  font-family: var(--mono);
  font-size: 0.7rem;
  padding: 6px 14px;
  border-radius: 6px;
  cursor: pointer;
  float: right;
  transition: all 0.2s;
}
.reset-btn:hover { border-color: var(--red); color: var(--red); }

/* Exam countdown */
.countdown {
  display: flex;
  gap: 0.5rem;
  overflow-x: auto;
  padding-bottom: 0.5rem;
  margin-bottom: 1.5rem;
}
.countdown-item {
  min-width: 110px;
  padding: 0.75rem 1rem;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  text-align: center;
  flex-shrink: 0;
}
.countdown-label {
  font-family: var(--mono);
  font-size: 0.65rem;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: 1px;
}
.countdown-days {
  font-family: var(--serif);
  font-size: 2rem;
}
.countdown-date {
  font-family: var(--mono);
  font-size: 0.7rem;
  color: var(--text3);
}

/* Footer */
footer {
  margin-top: 3rem;
  padding: 1.5rem 0;
  border-top: 1px solid var(--border);
  text-align: center;
  font-family: var(--mono);
  font-size: 0.7rem;
  color: var(--text3);
}

@media (max-width: 600px) {
  .container { padding: 1rem; }
  header h1 { font-size: 2rem; letter-spacing: -1px; }
  .stats { grid-template-columns: repeat(2, 1fr); }
  nav button { font-size: 0.7rem; padding: 0.5rem 0.25rem; }
}
</style>
</head>
<body>
<div class="container">

<header>
  <h1>Wiskunde<span>.</span></h1>
  <p>6AWWI · SO-Zenith · Examens 10-11 juni 2026</p>
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  <div class="progress-label">
    <span id="progressText">0 / 0 succescriteria</span>
    <span id="progressPct">0%</span>
  </div>
  <div class="progress-bar" style="margin-top:0.75rem"><div class="progress-fill" id="exFill" style="background:linear-gradient(90deg,var(--blue),var(--purple))"></div></div>

    <span id="exText">0 / 0 oefeningen</span>

  <button class="active" onclick="showSection('volgorde')">Leervolgorde</button>

// ========== STATE ==========
let checked = JSON.parse(localStorage.getItem('wisk-checked') || '{}');
let exChecked = JSON.parse(localStorage.getItem('wisk-ex-checked') || '{}');

function toggleEx(id) {
  exChecked[id] = !exChecked[id];
  const el = document.getElementById(id);
  if (el) {
    el.classList.toggle('checked', !!exChecked[id]);
    el.textContent = exChecked[id] ? '✓' : '';
    const txt = el.nextElementSibling;
    if (txt) txt.classList.toggle('done', !!exChecked[id]);
  }
  localStorage.setItem('wisk-ex-checked', JSON.stringify(exChecked));
  updateProgress();
}

function saveState() {
  localStorage.setItem('wisk-checked', JSON.stringify(checked));
  updateProgress();
}

function toggleCheck(id) {
  checked[id] = !checked[id];
  const el = document.getElementById('chk-' + id);
  const txt = document.getElementById('txt-' + id);
  if (el) { el.classList.toggle('checked', !!checked[id]); el.textContent = checked[id] ? '✓' : ''; }
  if (txt) { txt.classList.toggle('done', !!checked[id]); }
  saveState();
}

function updateProgress() {
  let total = 0, done = 0;
  CHAPTERS.forEach(ch => {
    ch.criteria.forEach((_, i) => {
      total++;
      if (checked[ch.id + '-' + i]) done++;
    });
  });
  const pct = total > 0 ? Math.round(done / total * 100) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = done + ' / ' + total + ' succescriteria';
  document.getElementById('progressPct').textContent = pct + '%';

  // exercises (separate count)
  let exTotal = 0, exDone = 0;
  CHAPTERS.forEach(ch => {
    if (!ch.exercises) return;
    ['mustDo', 'shouldDo', 'extra'].forEach(tier => {
      (ch.exercises[tier] || []).forEach((_, j) => {
        exTotal++;
        if (exChecked['ex-' + ch.id + '-' + tier + '-' + j]) exDone++;
      });
    });
  });
  const exPct = exTotal > 0 ? Math.round(exDone / exTotal * 100) : 0;
  document.getElementById('exFill').style.width = exPct + '%';
  document.getElementById('exText').textContent = exDone + ' / ' + exTotal + ' oefeningen';
  document.getElementById('exPct').textContent = exPct + '%';

  // stats
  const totalHours = CHAPTERS.reduce((s, c) => s + c.hours, 0);
  const doneChapters = CHAPTERS.filter(ch => ch.criteria.every((_, i) => checked[ch.id + '-' + i])).length;
  document.getElementById('stats').innerHTML = `
    <div class="stat"><div class="stat-number">${CHAPTERS.length}</div><div class="stat-label">Blokken</div></div>
    <div class="stat"><div class="stat-number">${doneChapters}</div><div class="stat-label">Afgerond</div></div>
    <div class="stat"><div class="stat-number">${exDone}/${exTotal}</div><div class="stat-label">Oefeningen</div></div>
    <div class="stat"><div class="stat-number">${totalHours}u</div><div class="stat-label">Studie</div></div>
  `;
}


// ========== RENDER ==========
function renderChapters() {
  const container = document.getElementById('sec-volgorde');
  let html = '<button class="reset-btn" onclick="resetProgress()">↺ Reset voortgang</button>';
  let currentPhase = 0;

  CHAPTERS.forEach(ch => {
    if (ch.phase !== currentPhase) {
      currentPhase = ch.phase;
      const phaseClass = 'phase-' + ch.phase;
      const label = ch.phaseLabel || '';
      if (label) html += `<div class="phase ${phaseClass}">${label}</div>`;
    }

    const allDone = ch.criteria.every((_, i) => checked[ch.id + '-' + i]);

    html += `<div class="chapter ${allDone ? 'completed' : ''}" id="ch-${ch.id}">
      <div class="chapter-header" onclick="toggleChapter('${ch.id}')">
        <div class="chapter-number" style="background:${ch.color}22;color:${ch.color}">${ch.number}</div>
        <div class="chapter-info">
          <div class="chapter-title">${ch.title}</div>
          <div class="chapter-meta">${ch.pages} · ${ch.hours}u · ${ch.criteria.length} criteria</div>
        </div>
        <div class="chapter-toggle">▼</div>
      </div>
      <div class="chapter-body">
        <div class="chapter-content">`;

    ch.criteria.forEach((c, i) => {
      const cid = ch.id + '-' + i;
      const isDone = !!checked[cid];
      html += `<div class="criteria-item">
        <div class="criteria-check ${isDone ? 'checked' : ''}" id="chk-${cid}" onclick="event.stopPropagation();toggleCheck('${cid}')">${isDone ? '✓' : ''}</div>
        <span class="criteria-text ${isDone ? 'done' : ''}" id="txt-${cid}">${c}</span>
      </div>`;
    });

    if (ch.exercises) {
      const tiers = [
        { key: 'mustDo', label: 'Must-do', color: 'var(--red)' },
        { key: 'shouldDo', label: 'Should-do', color: 'var(--orange)' },
        { key: 'extra', label: 'Extra', color: 'var(--text3)' },
      ];
      html += `<div class="exercises"><strong>Oefeningen</strong>`;
      tiers.forEach(tier => {
        const list = ch.exercises[tier.key] || [];
        if (list.length === 0) return;
        html += `<div class="ex-tier"><div class="ex-tier-label" style="color:${tier.color}">${tier.label}</div>`;
        list.forEach((ex, j) => {
          const exid = 'ex-' + ch.id + '-' + tier.key + '-' + j;
          const exDone = !!exChecked[exid];
          html += `<div class="ex-item">
            <div class="ex-check ${exDone ? 'checked' : ''}" id="${exid}" onclick="event.stopPropagation();toggleEx('${exid}')">${exDone ? '✓' : ''}</div>
            <span class="ex-text ${exDone ? 'done' : ''}">${ex}</span>
          </div>`;
        });
        html += `</div>`;
      });
      html += `</div>`;
    }
    if (ch.tip) {
      html += `<div class="tip">💡 ${ch.tip}</div>`;
    }
    if (ch.jarvis) {
      html += `<div class="jarvis" onclick="copyJarvis(this, \`${ch.jarvis.replace(/`/g, "'")}\`)">🤖 Jarvis: "${ch.jarvis}"</div>`;
    }

    html += `</div></div></div>`;
  });

  container.innerHTML = html;
}

function renderFormulas() {
  const container = document.getElementById('sec-formules');
  let html = '';
  CHAPTERS.forEach(ch => {
    if (!ch.formulas || ch.formulas.length === 0) return;
    html += `<div class="formula-card">
      <h3><span class="dot" style="background:${ch.color}"></span>${ch.title}</h3>`;
    ch.formulas.forEach(f => {
      html += `<div class="formula-item"><span class="formula-name">${f.name}:</span> ${f.formula}</div>`;
    });
    html += `</div>`;
  });
  container.innerHTML = html;
}

function renderPlanning() {
  const container = document.getElementById('sec-planning');
  let html = '';
  PLANNING.forEach(p => {
    const isExam = p.tasks.some(t => t.includes('EXAMEN'));
    html += `<div class="day-card" style="${isExam ? 'border-color:var(--red);background:var(--redBg)' : ''}">
      <h3>${p.day} ${p.note ? '<span class="day-date">' + p.note + '</span>' : ''}</h3>
      <div class="day-tasks">${p.tasks.map(t => {
        let color = '#666';
        if (t.includes('EXAMEN') || t.includes('TOETS')) color = 'var(--red)';
        else if (t.includes('REVIEW') || t.includes('FINALE')) color = 'var(--orange)';
        else if (t.includes('Alg')) color = 'var(--blue)';
        return `<div style="color:${color}">→ ${t}</div>`;

  });
  container.innerHTML = html;
}

function renderCountdown() {
  const now = new Date();
  const exams = [
    { label: "Deel 1", date: new Date("2026-06-10"), color: "var(--red)" },
    { label: "Deel 2", date: new Date("2026-06-11"), color: "var(--red)" },
    { label: "Toets hoeken/afst.", date: new Date("2026-06-02"), color: "var(--blue)" },
  ];
  const container = document.getElementById('countdown');
  container.innerHTML = exams.map(e => {
    const diff = Math.ceil((e.date - now) / 86400000);
    const months = ['jan','feb','mrt','apr','mei','jun'];
    return `<div class="countdown-item" style="border-color:${e.color}30">
      <div class="countdown-label">${e.label}</div>
      <div class="countdown-days" style="color:${diff <= 3 ? 'var(--red)' : 'var(--text)'}">D-${diff}</div>
      <div class="countdown-date">${e.date.getDate()} ${months[e.date.getMonth()]}</div>
    </div>`;
  }).join('');
}

  el.classList.toggle('open');
}

function showSection(name) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.getElementById('sec-' + name).classList.add('active');
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
}

function copyJarvis(el, text) {
  navigator.clipboard.writeText(text).then(() => {
    el.classList.add('copied');
    setTimeout(() => el.classList.remove('copied'), 2000);
  });
}

function resetProgress() {
  if (confirm('Weet je zeker dat je alle voortgang wilt resetten? (criteria én oefeningen)')) {
    checked = {};
    exChecked = {};
    localStorage.removeItem('wisk-checked');
    localStorage.removeItem('wisk-ex-checked');
    renderChapters();
    updateProgress();
  }
}


// ========== INIT ==========
renderChapters();
renderFormulas();
renderPlanning();
renderCountdown();
updateProgress();
</script>
</body>
</html>
